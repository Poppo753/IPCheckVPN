<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Home Status</title>
    <style>
      :root {
        --bg: #0d1117;
        --card: #161b22;
        --border: #30363d;
        --text: #c9d1d9;
        --muted: #8b949e;
        --green: #3fb950;
        --red: #f85149;
        --accent: #58a6ff;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .container { width: 100%; max-width: 480px; }

      /* Big status banner */
      .banner {
        text-align: center;
        padding: 32px 16px;
        border-radius: 16px;
        margin-bottom: 16px;
        font-size: 32px;
        font-weight: 700;
        letter-spacing: -.5px;
      }
      .banner.ok  { background: rgba(63,185,80,.12); color: var(--green); }
      .banner.ko  { background: rgba(248,81,73,.12); color: var(--red);   }
      .banner .icon { font-size: 48px; display: block; margin-bottom: 8px; }

      /* Info card */
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 12px;
      }
      .row {
        display: flex;
        justify-content: space-between;
        padding: 8px 0;
        border-bottom: 1px solid var(--border);
      }
      .row:last-child { border-bottom: none; }
      .label { color: var(--muted); }
      .val   { font-weight: 600; }
      .val.ok { color: var(--green); }
      .val.ko { color: var(--red); }

      .notes {
        margin-top: 12px;
        padding: 12px;
        background: rgba(248,81,73,.08);
        border-radius: 8px;
        font-size: 14px;
        color: var(--red);
        line-height: 1.6;
      }

      .footer {
        text-align: center;
        font-size: 12px;
        color: var(--muted);
        margin-top: 16px;
      }
      .footer a { color: var(--accent); text-decoration: none; }

      /* Loading state */
      .loading { text-align: center; padding: 48px; color: var(--muted); }
      .loading .spinner {
        width: 32px; height: 32px;
        border: 3px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin .8s linear infinite;
        margin: 0 auto 12px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* Error state */
      .error { text-align: center; padding: 48px; color: var(--red); }
    </style>
  </head>
  <body>
    <div class="container" id="app">
      <div class="loading">
        <div class="spinner"></div>
        Caricamento...
      </div>
    </div>

    <script>
      const app = document.getElementById("app");

      function ago(isoStr) {
        const diff = Date.now() - new Date(isoStr).getTime();
        const m = Math.floor(diff / 60000);
        if (m < 1) return "adesso";
        if (m < 60) return m + " min fa";
        const h = Math.floor(m / 60);
        if (h < 24) return h + " ore fa";
        return Math.floor(h / 24) + " giorni fa";
      }

      function render(s) {
        const stale = (Date.now() - new Date(s.ts).getTime()) > 10 * 60 * 1000; // >10 min
        const emoji = s.ok && !stale ? "✅" : "❌";
        const label = s.ok && !stale ? "Tutto OK" : stale ? "Dati vecchi" : "Problemi";
        const cls   = s.ok && !stale ? "ok" : "ko";

        let html = `
          <div class="banner ${cls}">
            <span class="icon">${emoji}</span>
            ${label}
          </div>
          <div class="card">
            <div class="row">
              <span class="label">Ultimo check</span>
              <span class="val">${ago(s.ts)}</span>
            </div>
            <div class="row">
              <span class="label">Internet</span>
              <span class="val ${s.checks.internet ? 'ok' : 'ko'}">${s.checks.internet ? 'OK' : 'KO'}</span>
            </div>
            <div class="row">
              <span class="label">AX1800 LAN</span>
              <span class="val ${s.checks.ax1800_lan ? 'ok' : 'ko'}">${s.checks.ax1800_lan ? 'OK' : 'KO'}</span>
            </div>
            <div class="row">
              <span class="label">IP pubblico</span>
              <span class="val">${s.checks.public_ip || '—'}</span>
            </div>
            <div class="row">
              <span class="label">Timestamp</span>
              <span class="val" style="font-size:13px">${new Date(s.ts).toLocaleString("it-IT")}</span>
            </div>
        `;

        if (s.notes && s.notes.length) {
          html += `<div class="notes">${s.notes.map(n => "⚠ " + n).join("<br>")}</div>`;
        }

        html += `</div>
          <div class="footer">
            Aggiornamento automatico ogni 30 s &middot; <a href="status.json">raw json</a>
          </div>`;

        app.innerHTML = html;
      }

      async function load() {
        try {
          const res = await fetch("status.json?t=" + Date.now(), { cache: "no-store" });
          if (!res.ok) throw new Error(res.status);
          render(await res.json());
        } catch (e) {
          app.innerHTML = `<div class="error">Impossibile caricare status.json<br><small>${e.message}</small></div>`;
        }
      }

      load();
      setInterval(load, 30_000);
    </script>
  </body>
</html>
