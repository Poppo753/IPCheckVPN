<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Home Status</title>
    <link id="favicon" rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⏳</text></svg>">
    <style>
      :root {
        --bg: #0d1117;
        --card: #161b22;
        --border: #30363d;
        --text: #c9d1d9;
        --muted: #8b949e;
        --green: #3fb950;
        --red: #f85149;
        --yellow: #d29922;
        --accent: #58a6ff;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 24px;
      }
      .container { width: 100%; max-width: 520px; }

      /* Big status banner */
      .banner {
        text-align: center;
        padding: 28px 16px;
        border-radius: 16px;
        margin-bottom: 16px;
        font-size: 28px;
        font-weight: 700;
        letter-spacing: -.5px;
      }
      .banner.ok  { background: rgba(63,185,80,.12); color: var(--green); }
      .banner.ko  { background: rgba(248,81,73,.12); color: var(--red);   }
      .banner .icon { font-size: 44px; display: block; margin-bottom: 6px; }

      /* Info card */
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px 20px;
        margin-bottom: 12px;
      }
      .card h2 {
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--muted);
        margin-bottom: 10px;
      }
      .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 7px 0;
        border-bottom: 1px solid var(--border);
      }
      .row:last-child { border-bottom: none; }
      .label { color: var(--muted); font-size: 14px; }
      .val   { font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 6px; }
      .val.ok { color: var(--green); }
      .val.ko { color: var(--red); }
      .ms { font-weight: 400; font-size: 12px; color: var(--muted); }
      .ip-badge {
        display: inline-block;
        font-size: 10px;
        padding: 1px 6px;
        border-radius: 4px;
        background: rgba(210,153,34,.2);
        color: var(--yellow);
        font-weight: 600;
        margin-left: 4px;
      }

      .notes {
        margin-top: 12px;
        padding: 12px;
        background: rgba(248,81,73,.08);
        border-radius: 8px;
        font-size: 13px;
        color: var(--red);
        line-height: 1.6;
      }

      /* History timeline */
      .history {
        display: flex;
        gap: 3px;
        margin-top: 4px;
        flex-wrap: wrap;
      }
      .history .dot {
        width: 20px;
        height: 20px;
        border-radius: 4px;
        position: relative;
        cursor: default;
      }
      .history .dot.ok  { background: var(--green); opacity: .7; }
      .history .dot.ko  { background: var(--red);   opacity: .85; }
      .history .dot:hover { opacity: 1; transform: scale(1.2); }
      .tooltip {
        display: none;
        position: absolute;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 6px 10px;
        font-size: 11px;
        white-space: nowrap;
        z-index: 10;
        color: var(--text);
      }
      .dot:hover .tooltip { display: block; }

      .footer {
        text-align: center;
        font-size: 12px;
        color: var(--muted);
        margin-top: 16px;
      }
      .footer a { color: var(--accent); text-decoration: none; }
      .countdown { color: var(--accent); }

      /* Loading state */
      .loading { text-align: center; padding: 48px; color: var(--muted); }
      .loading .spinner {
        width: 32px; height: 32px;
        border: 3px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin .8s linear infinite;
        margin: 0 auto 12px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .error { text-align: center; padding: 48px; color: var(--red); }
    </style>
  </head>
  <body>
    <div class="container" id="app">
      <div class="loading">
        <div class="spinner"></div>
        Caricamento...
      </div>
    </div>

    <script>
      const app = document.getElementById("app");
      const faviconEl = document.getElementById("favicon");

      function setFavicon(emoji) {
        faviconEl.href = `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>${emoji}</text></svg>`;
      }

      function ago(isoStr) {
        const diff = Date.now() - new Date(isoStr).getTime();
        const s = Math.floor(diff / 1000);
        if (s < 60) return s + "s fa";
        const m = Math.floor(s / 60);
        if (m < 60) return m + " min fa";
        const h = Math.floor(m / 60);
        if (h < 24) return h + "h fa";
        return Math.floor(h / 24) + "g fa";
      }

      function checkVal(c, label) {
        const up = c.up;
        const ms = c.latency_ms != null ? `<span class="ms">${c.latency_ms}ms</span>` : "";
        return `<span class="val ${up ? 'ok' : 'ko'}">${up ? 'OK' : 'KO'} ${ms}</span>`;
      }

      function render(s, history) {
        const stale = (Date.now() - new Date(s.ts).getTime()) > 10 * 60 * 1000;
        const allOk = s.ok && !stale;
        const emoji = allOk ? "✅" : "❌";
        const label = allOk ? "Tutto OK" : stale ? "Dati vecchi" : "Problemi";
        const cls   = allOk ? "ok" : "ko";

        setFavicon(allOk ? "🟢" : "🔴");
        document.title = `${allOk ? "✅" : "❌"} Home Status`;

        let html = `
          <div class="banner ${cls}">
            <span class="icon">${emoji}</span>
            ${label}
          </div>
          <div class="card">
            <h2>Stato attuale</h2>
            <div class="row">
              <span class="label">Ultimo check</span>
              <span class="val">${ago(s.ts)}</span>
            </div>
            <div class="row">
              <span class="label">Internet</span>
              ${checkVal(s.checks.internet)}
            </div>
            <div class="row">
              <span class="label">DNS</span>
              ${checkVal(s.checks.dns)}
            </div>
            <div class="row">
              <span class="label">AX1800 LAN</span>
              ${checkVal(s.checks.ax1800_lan)}
            </div>
            <div class="row">
              <span class="label">VPN Tunnel</span>
              ${checkVal(s.checks.vpn_tunnel)}
            </div>
            <div class="row">
              <span class="label">IP pubblico</span>
              <span class="val">
                ${s.checks.public_ip || '—'}
                ${s.checks.ip_changed ? '<span class="ip-badge">CAMBIATO</span>' : ''}
              </span>
            </div>
            <div class="row">
              <span class="label">Timestamp</span>
              <span class="val" style="font-size:12px;color:var(--muted)">${new Date(s.ts).toLocaleString("it-IT")}</span>
            </div>
        `;

        if (s.notes && s.notes.length) {
          html += `<div class="notes">${s.notes.map(n => "⚠ " + n).join("<br>")}</div>`;
        }
        html += `</div>`;

        // History timeline
        if (history && history.entries && history.entries.length > 1) {
          const dots = history.entries.map(e => {
            const d = new Date(e.ts);
            const time = d.toLocaleTimeString("it-IT", { hour: "2-digit", minute: "2-digit" });
            const date = d.toLocaleDateString("it-IT", { day: "2-digit", month: "2-digit" });
            return `<div class="dot ${e.ok ? 'ok' : 'ko'}"><div class="tooltip">${date} ${time} — ${e.ok ? 'OK' : 'KO'}</div></div>`;
          }).join("");

          html += `<div class="card"><h2>Ultime ${history.entries.length} rilevazioni</h2><div class="history">${dots}</div></div>`;
        }

        html += `
          <div class="footer">
            Prossimo refresh: <span class="countdown" id="cd">30</span>s &middot; <a href="status.json">json</a> &middot; <a href="history.json">storico</a>
          </div>`;

        app.innerHTML = html;
      }

      let countdown = 30;
      setInterval(() => {
        countdown--;
        const el = document.getElementById("cd");
        if (el) el.textContent = Math.max(countdown, 0);
      }, 1000);

      async function load() {
        try {
          const t = Date.now();
          const [sRes, hRes] = await Promise.all([
            fetch("status.json?t=" + t, { cache: "no-store" }),
            fetch("history.json?t=" + t, { cache: "no-store" }).catch(() => null),
          ]);
          if (!sRes.ok) throw new Error(sRes.status);
          const status = await sRes.json();
          const history = hRes && hRes.ok ? await hRes.json() : null;
          render(status, history);
          countdown = 30;
        } catch (e) {
          app.innerHTML = `<div class="error">Impossibile caricare status.json<br><small>${e.message}</small></div>`;
          setFavicon("⚠️");
        }
      }

      load();
      setInterval(load, 30_000);
    </script>
  </body>
</html>
